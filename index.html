<script>
const EXP={
"H15-1":"スピーカの能率（感度）は、入力電力1Wで1m離れた点での音圧レベルをdBで表します。",
"H15-2":"PAD（パッド）とは、信号を一定量（dB単位）減衰させる回路部品で、過大入力を防ぐために使用します。",
"H15-3":"コンデンサマイクは極板間の静電容量の変化を利用します。ダイナミックマイクはコイルと磁石を使います。",
"H15-4":"近接効果とは、指向性マイクを音源に近づけると低音域（低周波数）が強調される現象です。",
"H15-5":"バイオリンのような繊細な弦楽器の収音には、感度の高いコンデンサマイクが適しています。",
"H15-6":"音の高低（ピッチ）は周波数によって決まります。振幅（大小）は音の大きさ（音量）を表します。",
"H15-7":"暗騒音とは、特定の音がない状態で環境に存在する背景雑音のことです。",
"H15-8":"ピアノは弦楽器で、温度が上昇すると弦が伸びてピッチは下がります。",
"H15-9":"水中での音速は約1500m/s、空気中は約340m/sで、水中の方がはるかに速いです。",
"H15-10":"ハウリングとはスピーカの出力がマイクに入り込み、ループ状に増幅されて発振する現象です。",
"H15-11":"ホップノイズは物理的衝撃（マイクを叩く等）による雑音。誘導ノイズは電磁誘導が原因です。",
"H15-12":"モデラートは「中くらいの速さで」を意味するイタリア語の音楽用語です。",
"H15-13":"ファゴットはダブルリード（2枚のリード）の木管楽器。シングルリードはクラリネットなどです。",
"H15-14":"チェレスタは鍵盤を叩いて金属板を鳴らす鍵盤打楽器。弦楽器ではありません。",
"H15-15":"ティンパニーはペダルで音程を変えられる音階のある打楽器です。",
"H15-16":"コンサートマスターは第1バイオリン首席奏者で、指揮者とは別の役割です。",
"H15-17":"音響機器の極性（位相）を合わせることはノイズ低減と感電防止のために必要です。",
"H15-18":"箏曲（三曲）の舞台配置は、一般に筝は下手（客席から見て左）に配置します。",
"H15-19":"シューボックス型ホールは細長い直方体形状で、反射音が豊かで音響特性に優れます。",
"H15-20":"三方向から客席が囲む形式はオープンステージ。四方向はアリーナ形式です。",
"H15-21":"ホリゾント幕は舞台の一番奥（背景）に吊られる幕。舞台の両側にあるのは袖幕です。",
"H15-24":"ウーハーは低域再生専用ユニット。高音域信号を入力すると過大振動で破損します。",
"H15-25":"NTSCは毎秒約29.97フレーム（約30フレーム）。25フレームはPAL方式です。",
"H15-26":"オームの法則: I=V/R = 100V÷50Ω = 2A。正しい計算です。",
"H15-27":"ダイオードはPN接合半導体で、順方向にのみ電流を流す整流素子です。",
"H15-28":"ACコンセントの溝が長い方（左側）がアース（接地）側、短い方（右側）がホット側です。",
"H15-29":"劇場での裸火使用は消防法で禁止されており、消防署の禁止行為解除承認が必要です。",
"H15-30":"高所作業車は人を乗せたまま移動することは労働安全衛生法で禁止されています。",
"H16-6":"A級・AB級・B級アンプは定格出力を超えると急激に歪が増加します（クリッピング現象）。",
"H16-13":"整流後に残る交流成分をリップルといいます。コンデンサでリップルを除去して平滑化します。",
"H16-19":"1オクターブごとのエネルギーが等しいノイズはピンクノイズです。ホワイトノイズは全周波数帯域で同じエネルギーを持ちます。",
"H17-10":"著作権法により、音楽・映像作品を業務で使用する際は著作権者の許諾が必要です。",
"H17-16":"巻線比1:2のトランスでインピーダンス変換比は巻線比の2乗=4倍になります。2倍ではありません。",
"H17-21":"コーン型スピーカは口径が大きいほど低域再生に適します。高域には小口径が適しています。",
"H17-22":"音の速度は気温に左右されます。気温が1℃上昇するごとに約0.6m/s速くなります。",
"H17-25":"Vaはビオラ（Viola）の略記号です。バイオリンの略記号はVnまたはVl です。",
"H17-28":"オーケストラピットは舞台前面の客席との間の掘り下げた空間で、オーケストラが演奏する場所です。",
"H18-3":"時間差をつけて同じ音を出した場合に先に聞こえる音に音像が引きつけられる現象はハース効果です。",
"H18-5":"複数のマイクを並列接続（純パラ）するとインピーダンスが下がりレベルも変化するため避けるべきです。",
"H18-10":"交流電圧の実効値は最大値の1/√2倍（≒0.707倍）です。√2倍ではありません。",

  <div class="confirm-box ${confirmState}">
    <div class="confirm-msg ${confirmState}">${
      confirmState==='hist'?'成績履歴をリセットしますか？\nこの操作は元に戻せません。':
      confirmState==='wrong'?'不正解記録をリセットしますか？\nこの操作は元に戻せません。':
      '全データ（成績履歴・不正解記録）をリセットしますか？\nこの操作は元に戻せません。'
    }</div>
    <div class="confirm-row">
      <button class="confirm-yes ${confirmState}" onclick="doReset('${confirmState}')">削除する</button>
      <button class="confirm-no" onclick="confirmState=null;renderHome()">キャンセル</button>
    </div>
  </div>`:'';

  R(`
  <div class="app-header">
    <h1>舞台機構調整士 3級　過去問演習</h1>
    <p>平成15年〜令和7年度・全${DB.length}問収録（各年度30問）</p>
  </div>
  <div class="card">
    <div class="card-title">出題モードを選ぶ</div>
    <div class="mode-grid">
      ${[['year','m-year','📅','年度別','問題番号順に30問'],['cat','m-cat','📂','カテゴリ別','分野を絞って演習'],['wrong','m-wrong','📝','不正解集','苦手'+wc+'問を練習'],['all','m-all','🎲','全問シャッフル','全問ランダム出題']].map(([m,cls,ic,lbl,desc])=>`
      <div class="mcard ${cls} ${mode===m?'sel':''}" onclick="mode='${m}';confirmState=null;renderHome()">
        <div class="mc-chk" style="color:${mode===m?'#fff':''};border-color:${mode===m?'rgba(255,255,255,0.6)':''}">${mode===m?'✓':''}</div>
        <span class="mc-icon">${ic}</span><span class="mc-lbl">${lbl}</span><span class="mc-desc">${desc}</span>
      </div>`).join('')}
    </div>
  </div>
  ${mode==='year'?`<div class="card"><div class="card-title">年度を選ぶ</div><div class="year-grid">${YEARS.map(y=>{const cnt=DB.filter(r=>r[0]===y).length;return`<div class="yr-btn ${yearSel===y?'sel':''}" onclick="yearSel='${y}';renderHome()">${y}<br><span style="font-size:10px;opacity:0.75">${cnt}問</span></div>`;}).join('')}</div></div>`:''}
  ${mode==='cat'?`<div class="card"><div class="card-title">カテゴリを選ぶ</div><div class="cat-grid"><div class="ct-btn c-all ${catSel==='all'?'sel':''}" onclick="catSel='all';renderHome()">全分野</div>${CATS.map(c=>`<div class="ct-btn c-${c} ${catSel===c?'sel':''}" onclick="catSel='${c}';renderHome()">${c}</div>`).join('')}</div></div>`:''}
  ${mode==='wrong'&&wc===0?`<div class="warn-box">不正解の記録がありません。まず他のモードで演習してください。</div>`:''}
  <div class="timer-panel">
    <div class="tog-row"><button class="tog ${timerOn?'on':''}" onclick="timerOn=!timerOn;renderHome()"><span class="tog-k"></span></button><span class="tog-lbl">タイムアタックモード</span></div>
    ${timerOn?`<div class="t-opts">
      <div class="t-row"><div class="t-row-lbl">1問の制限時間</div><div class="seg">${[5,10,15,20,30].map(s=>`<button class="sb ${timerSec===s?'sel':''}" onclick="timerSec=${s};renderHome()">${s}秒</button>`).join('')}</div></div>
      ${mode!=='year'?`<div class="t-row"><div class="t-row-lbl">出題数</div><div class="seg">${[10,15,20,30].map(n=>`<button class="sb ${timerQCount===n?'sel':''}" onclick="timerQCount=${n};renderHome()">${n}問</button>`).join('')}<button class="sb ${timerQCount===9999?'sel':''}" onclick="timerQCount=9999;renderHome()">全問</button></div></div>`:''}
      <div class="t-note">回答後・時間切れ後は${autoSec}秒で次へ自動移動</div>
    </div>`:`<div class="t-note" style="margin-top:8px">オンにすると制限時間内での回答と自動送りが有効になります</div>`}
  </div>

  <div class="card">
    <div class="card-title">成績・履歴</div>
    ${sessH.length>0?sessH.slice().reverse().slice(0,5).map(h=>`
    <div class="hist-row">
      <div style="font-size:13px;color:var(--color-text-primary)">${h.mode}${h.label?' / '+h.label:''}</div>
      <div style="font-size:14px;font-weight:500;color:${h.pct>=80?'#1D9E75':h.pct>=60?'#BA7517':'#A32D2D'}">${h.correct}/${h.total}（${h.pct}%）</div>
    </div>`).join(''):`<div style="font-size:13px;color:var(--color-text-secondary);padding:4px 0">まだ成績がありません</div>`}

    <div class="reset-section">
      <div class="reset-title">データをリセットする</div>
      <div class="reset-btns">
        <button class="reset-btn hist" onclick="confirmState='hist';renderHome()">
          <span>成績履歴をリセット</span>
          <span class="reset-badge">${sessH.length}件</span>
        </button>
        <button class="reset-btn wrong" onclick="confirmState='wrong';renderHome()">
          <span>不正解記録をリセット</span>
          <span class="reset-badge">苦手${wc}問</span>
        </button>
        <button class="reset-btn all" onclick="confirmState='all';renderHome()">
          <span>全データをリセット</span>
          <span class="reset-badge">すべて</span>
        </button>
      </div>
      ${confirmHtml}
    </div>
  </div>

  <button class="start-btn ${canStart?'':'disabled'}" onclick="${canStart?'doStart()':''}">演習を開始する</button>
  `);
}

function doReset(type){
  if(type==='hist'){sessH=[];}
  else if(type==='wrong'){wrongH={};}
  else{sessH=[];wrongH={};}
  save();
  confirmState=null;
  renderHome();
}

function doStart(){
  confirmState=null;
  if(mode==='wrong'){const wk=Object.keys(wrongH).filter(k=>wrongH[k]>0);questions=shuffle(DB.filter(r=>wk.includes(r[0]+'-'+r[1])));}
  else if(mode==='year'){questions=DB.filter(r=>r[0]===yearSel).sort((a,b)=>a[1]-b[1]);}
  else if(mode==='cat'){questions=shuffle(catSel==='all'?[...DB]:DB.filter(r=>r[4]===catSel));}
  else{questions=shuffle([...DB]);}
  if(!questions.length){alert('該当する問題がありません。');return;}
  if(timerOn&&mode!=='year') questions=questions.slice(0,timerQCount===9999?questions.length:timerQCount);
  cur=0;answers=[];renderQuiz();
}

function mLabel(){return{year:'年度別',cat:'カテゴリ別',wrong:'不正解集',all:'全問シャッフル'}[mode];}
function sLabel(){return mode==='year'?yearSel+'年度':catSel!=='all'?catSel:'';}

function renderQuiz(){
  clearInterval(timerID);clearInterval(autoID);
  const q=questions[cur],ans=answers[cur];
  const total=questions.length,done=answers.filter(a=>a!==undefined).length;
  const corrN=answers.filter(a=>a&&a.correct).length,wrongN=done-corrN;
  const isLast=cur>=total-1;
  const exp=getExp(q);

  let banner='';
  if(ans){
    const verdict=ans.timedOut?'⏰ 時間切れ':ans.correct?'✓ 正解！':'✕ 不正解';
    const cls=ans.timedOut?'rb-to':ans.correct?'rb-ok':'rb-ng';
    banner=`<div class="res-banner ${cls}">
      <div class="rb-verdict">${verdict}</div>
      <span class="rb-ans">正答：「${q[3]?'○ 正しい':'× 誤り'}」</span>
      ${exp?`<div class="rb-exp">${exp}</div>`:''}
    </div>`;
  }

  let cO='ab ab-maru',cX='ab ab-batu';
  if(ans){
    if(ans.timedOut){cO='ab res-show';cX='ab res-show';}
    else{
      if(ans.userAns===true) cO=ans.correct?'ab res-ok':'ab res-ng';
      if(ans.userAns===false) cX=ans.correct?'ab res-ok':'ab res-ng';
      if(!ans.correct){if(q[3])cO='ab res-ok';else cX='ab res-ok';}
    }
  }

  document.getElementById('root').innerHTML=`
  <div class="quiz-header">
    <div class="qh-top"><div class="qh-mode">${mLabel()}${sLabel()?' / '+sLabel():''}</div><div class="qh-ctr">${cur+1} / ${total}問</div></div>
    <div class="qh-stats">
      <div class="qhs"><div class="qhs-v">${total}</div><div class="qhs-l">問題数</div></div>
      <div class="qhs"><div class="qhs-v ok">${corrN}</div><div class="qhs-l">正解</div></div>
      <div class="qhs"><div class="qhs-v ng">${wrongN}</div><div class="qhs-l">不正解</div></div>
    </div>
    <div class="pbar"><div class="pbar-in" style="width:${Math.round(done/total*100)}%"></div></div>
  </div>
  <div class="q-location">
    <span class="ql-year">${q[0]}年度</span>
    <span class="ql-num">第 ${q[1]} 問</span>
    <span class="ql-cat ql-${q[4]}">${q[4]}</span>
    <span style="font-size:12px;color:var(--color-text-secondary);margin-left:auto">${cur+1}問目 / 全${total}問</span>
  </div>
  ${timerOn&&!ans?`<div class="timer-ring"><svg id="tsvg" width="80" height="80" viewBox="0 0 80 80"></svg></div>`:''}
  ${timerOn&&ans?`<div class="auto-wrap"><div class="auto-lbl">次の問題へ自動移動中…</div><div class="auto-bar"><div class="auto-in" id="autobar"></div></div></div>`:''}
  <div class="q-area">
    <span class="q-label">問　題</span>
    <div class="q-text-card"><div class="q-text">${q[2]}</div></div>
  </div>
  <div class="ans-row">
    <button class="${cO}" onclick="doAns(true)" ${ans?'disabled':''}>
      <span class="ab-icon">○</span><span class="ab-lbl">正しい</span>
    </button>
    <button class="${cX}" onclick="doAns(false)" ${ans?'disabled':''}>
      <span class="ab-icon">×</span><span class="ab-lbl">誤り</span>
    </button>
  </div>
  ${banner}
  <div class="nav-row">
    <button class="nb menu-btn" onclick="goHome()">▲ メニュー</button>
    <button class="nb" onclick="goPrev()" ${cur===0?'disabled':''}>← 前へ</button>
    ${isLast?`<button class="nb pr" onclick="showResult()" ${!ans?'disabled':''}>結果を見る</button>`:`<button class="nb pr" onclick="goNext()" ${!ans?'disabled':''}>次へ →</button>`}
  </div>`;

  if(timerOn&&!ans) startCountdown();
  if(timerOn&&ans) startAutoNext(isLast);
}

function startCountdown(){
  timeLeft=timerSec;drawRing();
  timerID=setInterval(()=>{timeLeft--;drawRing();if(timeLeft<=0){clearInterval(timerID);if(!answers[cur]){const q=questions[cur];answers[cur]={userAns:null,correct:false,timedOut:true};wrongH[q[0]+'-'+q[1]]=(wrongH[q[0]+'-'+q[1]]||0)+1;save();renderQuiz();}}},1000);
}
function drawRing(){
  const el=document.getElementById('tsvg');if(!el)return;
  const r=33,cx=40,cy=40,circ=2*Math.PI*r,pct=Math.max(0,timeLeft/timerSec);
  const col=timeLeft<=3?'#E24B4A':timeLeft<=6?'#EF9F27':'#185FA5';
  el.innerHTML=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#D3D1C7" stroke-width="7"/>
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="7" stroke-dasharray="${(circ*pct).toFixed(2)} ${circ.toFixed(2)}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
  <text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="22" font-weight="500" fill="${col}">${timeLeft}</text>`;
}
function startAutoNext(isLast){
  let e=0;const steps=autoSec*4;
  const bar=()=>{const el=document.getElementById('autobar');if(el)el.style.width=Math.round((1-e/steps)*100)+'%';};
  bar();autoID=setInterval(()=>{e++;bar();if(e>=steps){clearInterval(autoID);if(isLast)showResult();else goNext();}},250);
}
function doAns(val){
  if(answers[cur])return;clearInterval(timerID);
  const q=questions[cur],ok=val===q[3];
  answers[cur]={userAns:val,correct:ok,timedOut:false};
  const k=q[0]+'-'+q[1];
  if(!ok)wrongH[k]=(wrongH[k]||0)+1;else wrongH[k]=Math.max(0,(wrongH[k]||0)-1);
  save();renderQuiz();
}
function goNext(){clearInterval(timerID);clearInterval(autoID);if(cur<questions.length-1){cur++;renderQuiz();}}
function goPrev(){clearInterval(timerID);clearInterval(autoID);if(cur>0){cur--;renderQuiz();}}
function goHome(){clearInterval(timerID);clearInterval(autoID);confirmState=null;renderHome();}

function showResult(){
  clearInterval(timerID);clearInterval(autoID);
  const total=questions.length,corrN=answers.filter(a=>a&&a.correct).length,toN=answers.filter(a=>a&&a.timedOut).length;
  const pct=Math.round(corrN/total*100);
  sessH.push({mode:mLabel(),label:sLabel(),correct:corrN,total,pct});save();
  const wi=questions.map((q,i)=>({q,a:answers[i]})).filter(x=>x.a&&!x.a.correct);
  document.getElementById('root').innerHTML=`
  <div class="res-header">
    <div class="res-pct" style="color:${pct>=80?'#9FE1CB':pct>=60?'#FAC775':'#F5C4B3'}">${pct}%</div>
    <div class="res-frac">${corrN} / ${total} 問正解</div>
    <div class="res-msg">${pct>=80?'合格圏内です！':pct>=60?'もう少しで合格圏です。':pct>=40?'基礎から見直しましょう。':'さらに学習が必要です。'}${toN>0?`　（時間切れ：${toN}問）`:''}</div>
    <div class="res-bar"><div class="res-bar-in" style="width:${pct}%"></div></div>
  </div>
  <div class="res-stats">
    <div class="rs"><div class="rsv ok">${corrN}</div><div class="rsl">正解</div></div>
    <div class="rs"><div class="rsv ng">${total-corrN-toN}</div><div class="rsl">不正解</div></div>
    <div class="rs"><div class="rsv to">${toN}</div><div class="rsl">時間切れ</div></div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="acb pr" onclick="cur=0;answers=[];renderQuiz()">もう一度</button>
    <button class="acb" onclick="goHome()">メニューへ</button>
    ${wi.length>0?`<button class="acb rd" onclick="mode='wrong';catSel='all';doStart()">不正解を練習</button>`:''}
  </div>
  ${wi.length>0?`<div class="card"><div class="card-title">間違えた問題（${wi.length}問）</div>${wi.map(x=>{const exp=getExp(x.q);return`<div class="wi"><div class="wi-meta">${x.q[0]}年度 第${x.q[1]}問 ／ ${x.q[4]}${x.a.timedOut?' ／ 時間切れ':''}</div><div class="wi-q">${x.q[2]}</div><div style="font-size:13px;color:#1D9E75;font-weight:500">正答：${x.q[3]?'○ 正しい':'× 誤り'}</div>${!x.a.timedOut?`<div style="font-size:13px;color:#A32D2D;font-weight:500">あなた：${x.a.userAns?'○':'×'}</div>`:''}${exp?`<div style="font-size:13px;color:var(--color-text-secondary);margin-top:6px;padding:8px 10px;background:var(--color-background-secondary);border-radius:8px;line-height:1.55">${exp}</div>`:''}</div>`;}).join('')}</div>`:`<div style="color:#1D9E75;font-size:17px;font-weight:500;text-align:center;padding:1.5rem 0">全問正解！完璧です！</div>`}`;
}

renderHome();
</script>
